<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Realtime Multiplayer Snake</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="ui-container" class="glass-panel">
    <div id="initial-screen">
      <h1>Sandal Snake</h1>
      <p class="subtitle">A calm, realtime multiplayer experience</p>
      
      <div class="input-group">
        <input type="text" id="player-name" placeholder="Enter your name..." class="name-input" maxlength="12" />
      </div>

      <button id="join-btn" class="primary-btn">Join Game</button>
    </div>
    
    <div id="game-screen" class="hidden">
      <div class="header">
        <h2>Match in Progress</h2>
        <div id="score-board"></div>
      </div>
      
      <div class="canvas-container">
        <canvas id="game-canvas"></canvas>
        <div id="game-over-overlay" class="hidden">
          <h2 id="game-over-title">Game Over</h2>
          <button id="replay-btn" class="primary-btn">Play Again</button>
        </div>
      </div>
      
      <div id="status-message">Waiting for players...</div>
    </div>
  </div>

  <div id="toast-container"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="client.js"></script>
</body>
</html>
