apiVersion: apps/v1
kind: Deployment
metadata:
  name: snake-app
  namespace: snake-game
spec:
  replicas: 1
  selector:
    matchLabels:
      app: snake-app
  template:
    metadata:
      labels:
        app: snake-app
    spec:
      containers:
      - name: snake-app
        image: snake-multiplayer:local
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
        env:
        - name: REDIS_URL
          value: "redis://redis:6379"
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: snake-app
  namespace: snake-game
spec:
  type: NodePort
  selector:
    app: snake-app
  ports:
  - port: 80
    targetPort: 3000
    nodePort: 30000
